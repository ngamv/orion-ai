app:
  name: "ORION AI"
  version: "1.0.0"
  env: "development"

llm:
  default_provider: "ollama"
  ollama:
    url: "http://localhost:11434"
    model: "mistral"
  anthropic:
    model: "claude-sonnet-4-20250514"

memory:
  short_term_ttl: 3600
  long_term_enabled: true

logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
